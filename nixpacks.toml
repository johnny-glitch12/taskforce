# ────────────────────────────────────────────────────────────────────────────
# Nixpacks build (alternative to Dockerfile — Railway picks whichever exists,
# preferring the Dockerfile when both are present).
# ────────────────────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = ["python311", "gcc", "nodejs_20", "libffi", "libmagic"]

[phases.frontend]
dependsOn = ["setup"]
cmds = [
    "cd frontend && npm install --no-audit --no-fund --legacy-peer-deps && CI=false GENERATE_SOURCEMAP=false PUBLIC_URL=/spa npm run build",
    "mkdir -p backend/spa && cp -r frontend/build/. backend/spa/"
]

[phases.install]
dependsOn = ["setup"]
cmds = ["pip install --no-cache-dir --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r backend/requirements.txt"]

[start]
cmd = "bash scripts/start.sh"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONPATH = "/app/backend"
GENERATE_SOURCEMAP = "false"
DISABLE_ESLINT_PLUGIN = "true"
