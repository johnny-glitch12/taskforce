<!doctype html>
<!-- Source template for public/og.png (1200x630 social share card).
     Regenerate: open at 1200x630 viewport and screenshot, e.g.
     browse viewport 1200x630 && browse goto file://$(pwd)/og-template.html && browse screenshot --viewport public/og.png -->
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0a0a0a;
    position: relative;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .glow {
    position: absolute; right: -180px; top: -180px;
    width: 560px; height: 560px; border-radius: 50%;
    background: radial-gradient(circle, rgba(34, 211, 238, 0.13) 0%, transparent 65%);
  }
  .wordmark {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 48px;
  }
  .wordmark .square { width: 14px; height: 14px; background: #22d3ee; }
  .wordmark .name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500; font-size: 26px; letter-spacing: 0.18em;
    color: #fafafa;
  }
  .wordmark .name span { color: #22d3ee; }
  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 110px; line-height: 0.95;
    color: #fafafa; letter-spacing: -0.01em;
    margin-bottom: 36px;
  }
  h1 .accent { color: #22d3ee; }
  .sub {
    font-size: 30px; font-weight: 400; line-height: 1.45;
    color: #a1a1aa; max-width: 820px;
    margin-bottom: 56px;
  }
  .sub strong { color: #e4e4e7; font-weight: 600; }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; letter-spacing: 0.14em; font-weight: 500;
    color: #22d3ee; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="wordmark">
    <div class="square"></div>
    <div class="name">TASK<span>FORCE</span></div>
  </div>
  <h1>The AI Execution<br /><span class="accent">Economy.</span></h1>
  <div class="sub"><strong>Build, deploy, and monetize autonomous agents.</strong> Stop coding. Start deploying.</div>
  <div class="url">taskforce.run</div>
</body>
</html>
