# ────────────────────────────────────────────────────────────────────────────
# Railway deployment manifest — Task Force AI
# Docs: https://docs.railway.app/reference/config-as-code
#
# IMPORTANT module paths (THIS codebase, not a generic Railway template):
#   • FastAPI entry  : backend/server.py        →  `backend.server:app`
#   • Celery app     : backend/lib/celery_app.py → `backend.lib.celery_app`
# Do NOT use `backend.main:app` or `backend.celery_app` — those modules
# don't exist here; the services will crash on start with ModuleNotFoundError.
#
# MULTI-SERVICE NOTE: This single railway.toml is shared by all three services
# (web, worker, beat). Per-service overrides must be set in the Railway dashboard:
#   • web    — no changes needed; healthcheck at /api/health is configured below.
#   • worker — disable healthcheck in dashboard (Settings → Deploy → Health Check).
#              Background Celery worker; no HTTP server, no /api/health endpoint.
#   • beat   — disable healthcheck in dashboard (Settings → Deploy → Health Check).
#              Background Celery beat scheduler; no HTTP server, no /api/health endpoint.
# ────────────────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
# Web service entry point — starts Uvicorn serving the FastAPI app.
# worker and beat services override this via their Railway dashboard start command
# (bash scripts/worker.sh and bash scripts/beat.sh respectively).
startCommand = "cd /app/backend && uvicorn server:app --host 0.0.0.0 --port $PORT"

# Health probe for the web service only.
# ⚠️  worker and beat services MUST have healthchecks disabled in the Railway
# dashboard — they are background processes with no HTTP endpoint to probe.
# healthcheckPath and healthcheckTimeout are intentionally omitted here so that
# worker/beat don't fail health checks out of the box. Re-enable for web only
# via the Railway dashboard (Settings → Deploy → Health Check → /api/health).
# healthcheckPath = "/api/health"
# healthcheckTimeout = 300

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

numReplicas = 1
