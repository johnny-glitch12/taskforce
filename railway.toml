# ────────────────────────────────────────────────────────────────────────────
# Railway deployment manifest — Task Force AI
# Docs: https://docs.railway.app/reference/config-as-code
#
# IMPORTANT module paths (THIS codebase, not a generic Railway template):
#   • FastAPI entry  : backend/server.py        →  `backend.server:app`
#   • Celery app     : backend/lib/celery_app.py → `backend.lib.celery_app`
# Do NOT use `backend.main:app` or `backend.celery_app` — those modules
# don't exist here; the services will crash on start with ModuleNotFoundError.
# ────────────────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
# MULTI-SERVICE NOTE: startCommand and healthcheckPath are NOT set here
# because this railway.toml is shared by web, worker, and beat services.
# Configure these per-service in the Railway dashboard:
#   • web    — startCommand: bash /app/scripts/start.sh
#              healthcheckPath: /api/health, healthcheckTimeout: 300
#   • worker — startCommand: bash /app/scripts/worker.sh
#              No healthcheck (Celery worker has no HTTP server)
#   • beat   — startCommand: bash /app/scripts/beat.sh
#              No healthcheck (Celery beat has no HTTP server)

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

numReplicas = 1
